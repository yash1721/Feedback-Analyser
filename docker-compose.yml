services:
  feedbackiq-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg://feedbackiq:feedbackiq@feedbackiq-db:5432/feedbackiq
      LOCAL_STORAGE_DIR: /app/.local_storage
    depends_on:
      - feedbackiq-db
      - feedbackiq-redis

  feedbackiq-worker:
    build: .
    env_file:
      - .env
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg://feedbackiq:feedbackiq@feedbackiq-db:5432/feedbackiq
      LOCAL_STORAGE_DIR: /app/.local_storage
      REDIS_URL: redis://feedbackiq-redis:6379/0
      CELERY_BROKER_URL: redis://feedbackiq-redis:6379/0
      CELERY_RESULT_BACKEND: redis://feedbackiq-redis:6379/1
    depends_on:
      - feedbackiq-db
      - feedbackiq-redis

  feedbackiq-db:
    image: postgres:16
    environment:
      POSTGRES_DB: feedbackiq
      POSTGRES_USER: feedbackiq
      POSTGRES_PASSWORD: feedbackiq
    ports:
      - "5432:5432"
    volumes:
      - feedbackiq-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbackiq -d feedbackiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  feedbackiq-redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  feedbackiq-postgres-data:
